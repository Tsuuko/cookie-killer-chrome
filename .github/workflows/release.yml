name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Chrome extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Type check
        run: npm run compile

      - name: Build Chrome extension
        run: npm run build

      - name: Package Chrome extension
        run: npm run zip

      - name: Locate release artifact
        id: artifact
        run: |
          ARTIFACT="$(find .output -maxdepth 1 -type f -name '*.zip' | head -n 1)"

          if [ -z "$ARTIFACT" ]; then
            echo "No zip artifact found in .output."
            exit 1
          fi

          echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true
